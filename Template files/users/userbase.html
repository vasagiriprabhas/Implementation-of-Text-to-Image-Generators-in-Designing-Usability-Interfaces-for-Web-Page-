{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Text-to-Image Generators</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap 4 CSS -->
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="{% static 'css/style.css' %}">

    <style>
        /* Loader fix */
        .loader_bg {
            position: fixed;
            z-index: 99999;
            background: #fff;
            width: 100%;
            height: 100%;
        }

        .loader {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        /* FORCE dropdown visibility */
        .dropdown-menu {
            z-index: 9999;
        }
    </style>
</head>

<body>

<!-- Loader -->
<div class="loader_bg">
    <div class="loader">
        <img src="{% static 'images/loading.gif' %}" alt="Loading">
    </div>
</div>

<!-- HEADER -->
<nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm">
    <a class="navbar-brand font-weight-bold" href="#">
        <span class="text-success">Text-to-image</span> Generators
    </a>

    <button class="navbar-toggler" type="button" data-toggle="collapse"
            data-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ml-auto">

            <!-- Image Style Dropdown -->
            <li class="nav-item dropdown">
                <a class="nav-link dropdown-toggle"
                   href="#"
                   id="styleDropdown"
                   role="button"
                   data-toggle="dropdown"
                   aria-haspopup="true"
                   aria-expanded="false">
                    Image Style
                </a>

                <div class="dropdown-menu">
                    <a class="dropdown-item" href="#" onclick="setStyle('algerian')">
                        Algerian Style
                    </a>
                    <a class="dropdown-item" href="#" onclick="setStyle('iconic')">
                        Iconic Style
                    </a>
                    <a class="dropdown-item" href="#" onclick="setStyle('realistic')">
                        Realistic Style
                    </a>
                </div>
            </li>

            <li class="nav-item">
                <a class="nav-link" href="{% url 'UserHome' %}">Home</a>
            </li>

            <li class="nav-item">
                <a class="nav-link" href="{% url 'test_text_to_image' %}">Text-to-image</a>
            </li>

            <li class="nav-item">
                <a class="nav-link" href="{% url 'index' %}">Logout</a>
            </li>

        </ul>
    </div>
</nav>

<!-- CONTENT -->
{% block contents %}{% endblock %}

<!-- FOOTER -->
<footer class="bg-success text-white text-center p-3 mt-5">
    <p class="mb-0">
        Copyright <span id="year"></span>
        All Rights Reserved | Design by Alex Corporation
    </p>
</footer>

<!-- JS (ORDER IS CRITICAL) -->
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.1/dist/umd/popper.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.min.js"></script>

<script>
    // Remove loader
    $(window).on("load", function () {
        $(".loader_bg").fadeOut("slow");
    });

    // Footer year
    document.getElementById("year").innerHTML = new Date().getFullYear();

    // Image style setter
    function setStyle(style) {
        alert("Selected Style: " + style);
        if (document.getElementById("styleInput")) {
            document.getElementById("styleInput").value = style;
        }
    }
</script>

</body>
</html>
